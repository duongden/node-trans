<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Trans - Real-time Audio Translation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>🎙️ Node Trans <span class="author">by ThaiNPH</span></h1>
        <div class="header-right">
          <div class="status-bar" id="statusBar">Disconnected</div>
          <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
        </div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="live">Live</button>
        <button class="tab" data-tab="history">History</button>
        <button class="tab" data-tab="settings">Settings</button>
      </nav>

      <!-- Live Tab -->
      <section class="tab-content active" id="tab-live">
        <div class="controls">
          <button id="toggleBtn" class="btn-start">▶ Start</button>
          <button id="pauseBtn" class="btn-pause" style="display:none">⏸ Pause</button>
          <button id="resumeBtn" class="btn-resume" style="display:none">▶ Resume</button>
          <button id="newSessionBtn" class="btn-new" style="display:none">⊕ New Meeting</button>
        </div>

        <div class="transcript" id="transcript">
          <div class="placeholder">Press "Start" to listen and translate audio</div>
        </div>

        <div class="partial" id="partial"></div>
      </section>

      <!-- History Tab -->
      <section class="tab-content" id="tab-history">
        <div class="history-toolbar" id="historyToolbar" style="display: none">
          <label class="select-all-label">
            <input type="checkbox" id="selectAll" /> Select all
          </label>
          <span id="selectedCount"></span>
          <button class="btn-delete" id="deleteSelectedBtn">🗑 Delete</button>
          <button class="btn-cancel-select" id="cancelSelectBtn">Cancel</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="placeholder">Loading history...</div>
        </div>

        <div class="session-detail" id="sessionDetail" style="display: none">
          <div class="detail-toolbar">
            <button class="btn-back" id="backBtn">← Back</button>
            <button class="btn-export" id="exportBtn">📥 Export Markdown</button>
          </div>
          <div id="sessionInfo"></div>
          <div id="sessionUtterances"></div>
        </div>
      </section>

      <!-- Settings Tab -->
      <section class="tab-content" id="tab-settings">
        <div class="settings-form">
          <div class="setting-group">
            <label>Audio Source:</label>
            <select id="settingAudioSource">
              <option value="mic">Microphone</option>
              <option value="system">System Audio</option>
              <option value="both">Both (Microphone & System Audio)</option>
            </select>
          </div>

          <div class="setting-group">
            <label>Microphone Device:</label>
            <select id="settingMicDevice"></select>
          </div>

          <div class="setting-group">
            <label>Target Language:</label>
            <select id="settingTargetLanguage">
              <option value="vi">Tiếng Việt</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="zh">中文</option>
              <option value="fr">Français</option>
              <option value="es">Español</option>
              <option value="de">Deutsch</option>
            </select>
          </div>

          <button class="btn-save" id="saveSettingsBtn">💾 Save Settings</button>
          <div class="save-status" id="saveStatus"></div>
        </div>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
